# 1. Tên định danh
name: my-custom-cyber-lab

# 2. Định nghĩa Hosts
hosts:
  - name: web-server
    base_box: 
      image: debian-11-bullseye 
    flavor: standard.small
  - name: user-pc
    base_box:
      image: debian-11-bullseye
    flavor: standard.small

# 3. Định nghĩa Routers
routers:
  - name: main-router
    base_box:
      image: debian-11-bullseye
    flavor: standard.small

# 4. Định nghĩa Networks (ĐƯA LÊN TRƯỚC GROUPS)
networks:
  - name: dmz-network
    cidr: 10.10.10.0/24
  - name: user-network
    cidr: 192.168.1.0/24

# 5. Định nghĩa Groups
groups:
  - name: internal-servers
    nodes:
      - web-server
      - user-pc

# 6. Định nghĩa Net Mappings
net_mappings:
  - host: web-server
    network: dmz-network
    ip: 10.10.10.10
  - host: user-pc
    network: user-network
    ip: 192.168.1.50

# 7. Định nghĩa Router Mappings
router_mappings:
  - router: main-router
    network: dmz-network
    ip: 10.10.10.1
  - router: main-router
    network: user-network
    ip: 192.168.1.1
