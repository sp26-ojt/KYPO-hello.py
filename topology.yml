# 1. Tên của Topology
name: my-custom-cyber-lab

# 2. Định nghĩa Hosts TRƯỚC (Theo yêu cầu của schema)
hosts:
  - name: web-server
    base_box: 
      image: debian-11-bullseye 
    flavor: standard.small
  - name: user-pc
    base_box:
      image: debian-11-bullseye
    flavor: standard.small

# 3. Định nghĩa Networks
networks:
  - name: dmz-network
    cidr: 10.10.10.0/24
  - name: user-network
    cidr: 192.168.1.0/24

# 4. Định nghĩa Routers
routers:
  - name: main-router
    cidr: 10.10.0.0/16
    flavor: standard.small

# 5. Định nghĩa Net Mappings
net_mappings:
  - host: web-server
    network: dmz-network
    ip: 10.10.10.10
  - host: user-pc
    network: user-network
    ip: 192.168.1.50

# 6. Định nghĩa Router Mappings
router_mappings:
  - router: main-router
    network: dmz-network
    ip: 10.10.10.1
  - router: main-router
    network: user-network
    ip: 192.168.1.1
