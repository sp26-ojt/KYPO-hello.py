# Định nghĩa các dải mạng (Subnets)
networks:
  - name: dmz-network
    cidr: 10.10.10.0/24
  - name: user-network
    cidr: 192.168.1.0/24

# Định nghĩa Router
routers:
  - name: main-router
    cidr: 10.10.0.0/16 # Dải IP quản lý của router (tùy chọn theo hệ thống)
    flavor: standard.small

# Định nghĩa các máy ảo (SỬA LỖI TẠI ĐÂY)
hosts:
  - name: web-server
    base_box: 
      image: debian-11-bullseye  # Thay bằng tên Image chính xác trong OpenStack của bạn
    flavor: standard.small
    
  - name: user-pc
    base_box:
      image: debian-11-bullseye  # Thay bằng tên Image chính xác trong OpenStack của bạn
    flavor: standard.small

# Kết nối Host vào Network
net_mappings:
  - host: web-server
    network: dmz-network
    ip: 10.10.10.10
  - host: user-pc
    network: user-network
    ip: 192.168.1.50

# Kết nối Router vào Network
router_mappings:
  - router: main-router
    network: dmz-network
    ip: 10.10.10.1
  - router: main-router
    network: user-network
    ip: 192.168.1.1
