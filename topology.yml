# 1. PHẢI CÓ TÊN CỦA TOPOLOGY Ở ĐÂY (SỬA LỖI NÀY)
name: my-custom-cyber-lab

# 2. Định nghĩa các dải mạng
networks:
  - name: dmz-network
    cidr: 10.10.10.0/24
  - name: user-network
    cidr: 192.168.1.0/24

# 3. Định nghĩa Router
routers:
  - name: main-router
    cidr: 10.10.0.0/16
    flavor: standard.small

# 4. Định nghĩa các máy ảo (Đã sửa base_box từ bước trước)
hosts:
  - name: web-server
    base_box: 
      image: debian-11-bullseye 
    flavor: standard.small
    
  - name: user-pc
    base_box:
      image: debian-11-bullseye
    flavor: standard.small

# 5. Kết nối Host vào Network
net_mappings:
  - host: web-server
    network: dmz-network
    ip: 10.10.10.10
  - host: user-pc
    network: user-network
    ip: 192.168.1.50

# 6. Kết nối Router vào Network
router_mappings:
  - router: main-router
    network: dmz-network
    ip: 10.10.10.1
  - router: main-router
    network: user-network
    ip: 192.168.1.1
