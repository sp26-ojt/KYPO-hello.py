# 1. Tên định danh
name: my-custom-cyber-lab

# 2. Hosts (Danh sách máy ảo)
hosts:
  - name: web-server
    base_box: 
      image: debian-11-bullseye 
    flavor: standard.small
  - name: user-pc
    base_box:
      image: debian-11-bullseye
    flavor: standard.small

# 3. Routers (Đưa lên trước Networks theo lỗi báo)
routers:
  - name: main-router
    cidr: 10.10.0.0/16
    flavor: standard.small

# 4. Networks (Dải mạng ảo)
networks:
  - name: dmz-network
    cidr: 10.10.10.0/24
  - name: user-network
    cidr: 192.168.1.0/24

# 5. Net Mappings (Gắn IP cho máy ảo)
net_mappings:
  - host: web-server
    network: dmz-network
    ip: 10.10.10.10
  - host: user-pc
    network: user-network
    ip: 192.168.1.50

# 6. Router Mappings (Gắn IP cho Router)
router_mappings:
  - router: main-router
    network: dmz-network
    ip: 10.10.10.1
  - router: main-router
    network: user-network
    ip: 192.168.1.1
